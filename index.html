<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PM Drug Stock" />
  <meta name="theme-color" content="#0a2540" />
  <title>Princess Marina Drug Stock</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a2540;
      --navy2: #123358;
      --blue: #1a6fc4;
      --sky: #38bdf8;
      --sky-light: #e0f2fe;
      --red: #ef4444;
      --red-light: #fee2e2;
      --amber: #f59e0b;
      --amber-light: #fef3c7;
      --green: #16a34a;
      --green-light: #dcfce7;
      --slate: #64748b;
      --border: #e2e8f0;
      --bg: #f0f5fb;
      --white: #ffffff;
      --text: #0f172a;
      --text2: #475569;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── PIN SCREEN ─── */
    #pin-screen {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, var(--navy) 0%, #1a4a7a 60%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #pin-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

    .pin-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--sky), var(--blue));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(56,189,248,0.3);
    }
    .pin-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      color: #fff; text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .pin-subtitle {
      color: #93c5fd; font-size: 13px; font-weight: 400;
      text-align: center; margin-bottom: 40px;
    }
    .pin-dots {
      display: flex; gap: 14px; margin-bottom: 32px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      background: transparent;
      transition: all 0.2s;
    }
    .pin-dot.filled {
      background: var(--sky);
      border-color: var(--sky);
      box-shadow: 0 0 12px rgba(56,189,248,0.5);
    }
    .pin-dot.error {
      background: var(--red);
      border-color: var(--red);
      animation: shake 0.4s ease;
    }
    .pin-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%; max-width: 300px;
    }
    .pin-btn {
      height: 68px; border: none; border-radius: 16px;
      background: rgba(255,255,255,0.1);
      color: #fff; font-size: 22px; font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .pin-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }
    .pin-btn.del { font-size: 18px; }
    .pin-btn.empty { background: transparent; border: none; cursor: default; }
    .pin-error {
      margin-top: 16px; color: #fca5a5; font-size: 13px;
      font-weight: 500; height: 20px; text-align: center;
    }

    /* ─── APP SHELL ─── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 52px 20px 0;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 24px rgba(10,37,64,0.18);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--sky), var(--blue));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(56,189,248,0.25);
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 800; color: #fff;
      letter-spacing: -0.3px;
    }
    .brand-sub { font-size: 11px; color: #93c5fd; font-weight: 400; }

    .alert-badge {
      background: var(--red); color: #fff;
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      animation: pulse 2s infinite;
    }

    /* Tabs */
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      flex: 1; padding: 11px 16px;
      border: none; border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .tab-btn.active { background: var(--bg); color: var(--navy); }
    .tab-btn.inactive { background: transparent; color: #93c5fd; }

    /* Stats */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 16px;
    }
    .stat-card {
      background: var(--white); border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-left: 4px solid var(--blue);
    }
    .stat-card.red { border-left-color: var(--red); }
    .stat-card.amber { border-left-color: var(--amber); }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 11px; color: var(--slate); font-weight: 500; margin-top: 2px; }

    /* Search + Filter */
    .controls { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 10px; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--white); border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 1.5px solid var(--border);
    }
    .search-box input {
      flex: 1; border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
      background: transparent;
    }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap; padding: 6px 14px;
      border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); color: var(--slate);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn.active {
      background: var(--sky-light); color: #0369a1;
      border-color: var(--sky);
    }

    /* Medication list */
    .med-list { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 8px; }

    .med-card {
      background: var(--white); border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 1.5px solid var(--border);
      transition: all 0.2s;
    }
    .med-card.low { border-color: #fca5a5; background: #fff8f8; }
    .med-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .med-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
      line-height: 1.3;
    }
    .med-detail { font-size: 12px; color: var(--slate); margin-top: 3px; }

    .stock-display { text-align: right; }
    .stock-num {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      line-height: 1;
    }
    .stock-num.ok { color: var(--green); }
    .stock-num.low { color: var(--red); }
    .stock-min { font-size: 11px; color: var(--slate); margin-top: 2px; }

    .med-card-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; gap: 8px;
    }
    .flags { display: flex; gap: 5px; flex-wrap: wrap; }
    .flag {
      border-radius: 5px; padding: 2px 7px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    }
    .flag.critical { background: var(--red-light); color: #b91c1c; }
    .flag.restricted { background: var(--amber-light); color: #92400e; }
    .flag.low-flag { background: #fecaca; color: #991b1b; }
    .flag.route { background: var(--sky-light); color: #0369a1; }

    /* Stock progress bar */
    .stock-bar-wrap { margin-top: 8px; }
    .stock-bar-bg {
      height: 4px; background: #e2e8f0; border-radius: 4px; overflow: hidden;
    }
    .stock-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* Update button + inline edit */
    .update-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1.5px solid #bae6fd;
      background: var(--sky-light); color: #0369a1;
      font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .update-btn:active { transform: scale(0.96); }

    .edit-row { display: flex; gap: 6px; align-items: center; }
    .edit-input {
      width: 60px; border: 1.5px solid var(--sky);
      border-radius: 8px; padding: 5px 8px;
      font-size: 15px; font-family: 'Syne', sans-serif; font-weight: 700;
      outline: none; color: var(--text); text-align: center;
    }
    .save-btn {
      padding: 6px 12px; border-radius: 8px; border: none;
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .cancel-btn {
      padding: 6px 10px; border-radius: 8px; border: none;
      background: var(--border); color: var(--slate);
      font-size: 13px; cursor: pointer;
    }

    /* Loading */
    .loading {
      text-align: center; padding: 60px 20px;
      color: var(--slate); font-size: 15px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--navy); color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 200; white-space: nowrap;
      animation: toastIn 0.3s ease;
    }
    .toast.error { background: var(--red); }

    /* Empty */
    .empty { text-align: center; padding: 48px 20px; color: var(--slate); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(12px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">💊</div>
  <div class="pin-title">Princess Marina</div>
  <div class="pin-subtitle">Drug Stock Management · Enter PIN to continue</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="brand-icon">💊</div>
        <div>
          <div class="brand-name">Princess Marina</div>
          <div class="brand-sub">Drug Stock Management</div>
        </div>
      </div>
      <div id="alert-badge" class="alert-badge" style="display:none">
        ⚠️ <span id="alert-count">0</span> Low
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-ed" onclick="switchTab('ED')">🏥 Emergency Dept</button>
      <button class="tab-btn inactive" id="tab-ph" onclick="switchTab('Pharmacy')">🏪 Pharmacy</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="stat-total" style="color:var(--blue)">—</div>
      <div class="stat-label">📋 Total Meds</div>
    </div>
    <div class="stat-card red">
      <div class="stat-num" id="stat-low" style="color:var(--red)">—</div>
      <div class="stat-label">⚠️ Low Stock</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-num" id="stat-critical" style="color:var(--amber)">—</div>
      <div class="stat-label">🔴 Critical</div>
    </div>
  </div>

  <div class="controls">
    <div class="search-box">
      <span style="font-size:16px">🔍</span>
      <input type="text" id="search-input" placeholder="Search medications..." oninput="renderList()" />
    </div>
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Critical', this)">🔴 Critical</button>
      <button class="filter-btn" onclick="setFilter('Restricted', this)">⚠️ Restricted</button>
      <button class="filter-btn" onclick="setFilter('Low Stock', this)">📉 Low Stock</button>
    </div>
  </div>

  <div class="med-list" id="med-list">
    <div class="loading"><div class="spinner"></div>Loading medications...</div>
  </div>
</div>

<script>
  // ── CONFIGURATION ─────────────────────────────────────────────
  const SUPABASE_URL = "https://cvqdtzaalyuwyiumginl.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cWR0emFhbHl1d3lpdW1naW5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDM4MTEsImV4cCI6MjA4ODI3OTgxMX0.GKh-aQXFCTGyUTGiHKcv5r2EUkK0OZVBdsdTYHrSguQ";
  const APP_PIN = "1234"; // ← CHANGE THIS to your desired PIN

  // ── PIN LOGIC ──────────────────────────────────────────────────
  let pinEntry = "";

  function pinPress(digit) {
    if (pinEntry.length >= 4) return;
    pinEntry += digit;
    updateDots();
    if (pinEntry.length === 4) {
      setTimeout(checkPin, 100);
    }
  }

  function pinDel() {
    pinEntry = pinEntry.slice(0, -1);
    updateDots();
    document.getElementById("pin-error").textContent = "";
  }

  function updateDots(state) {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById("d" + i);
      d.className = "pin-dot";
      if (state === "error") d.classList.add("error");
      else if (i < pinEntry.length) d.classList.add("filled");
    }
  }

  function checkPin() {
    if (pinEntry === APP_PIN) {
      document.getElementById("pin-screen").classList.add("hidden");
      document.getElementById("app").style.display = "flex";
      document.getElementById("app").style.flexDirection = "column";
      loadData();
    } else {
      updateDots("error");
      document.getElementById("pin-error").textContent = "Incorrect PIN. Try again.";
      pinEntry = "";
      setTimeout(() => updateDots(), 600);
    }
  }

  // ── STATE ──────────────────────────────────────────────────────
  let allData = [];
  let activeTab = "ED";
  let activeFilter = "All";
  let editingId = null;

  // ── DATA FETCHING ──────────────────────────────────────────────
  async function loadData() {
    document.getElementById("med-list").innerHTML = '<div class="loading"><div class="spinner"></div>Loading medications...</div>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/stock_status?select=*,medications(*)&location=eq.${activeTab}&order=medications(name)`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const data = await res.json();
      allData = Array.isArray(data) ? data : [];
      updateStats();
      renderList();
    } catch (e) {
      document.getElementById("med-list").innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div>Failed to load. Check your Supabase credentials.</div></div>';
    }
  }

  function updateStats() {
    const total = allData.length;
    const low = allData.filter(r => r.current_stock < r.min_stock).length;
    const critical = allData.filter(r => r.medications?.critical).length;
    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-low").textContent = low;
    document.getElementById("stat-critical").textContent = critical;
    const badge = document.getElementById("alert-badge");
    if (low > 0) {
      badge.style.display = "flex";
      document.getElementById("alert-count").textContent = low;
    } else {
      badge.style.display = "none";
    }
  }

  // ── RENDER ─────────────────────────────────────────────────────
  function renderList() {
    const search = document.getElementById("search-input").value.toLowerCase();
    const filtered = allData.filter(row => {
      const med = row.medications;
      if (!med) return false;
      const matchSearch = med.name.toLowerCase().includes(search) ||
        (med.formulation || "").toLowerCase().includes(search);
      const isLow = row.current_stock < row.min_stock;
      const matchFilter =
        activeFilter === "All" ||
        (activeFilter === "Critical" && med.critical) ||
        (activeFilter === "Restricted" && med.restricted) ||
        (activeFilter === "Low Stock" && isLow);
      return matchSearch && matchFilter;
    });

    if (filtered.length === 0) {
      document.getElementById("med-list").innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No medications found</div></div>';
      return;
    }

    document.getElementById("med-list").innerHTML = filtered.map((row, i) => {
      const med = row.medications;
      const isLow = row.current_stock < row.min_stock;
      const isEditing = editingId === row.id;
      const pct = Math.min(100, Math.round((row.current_stock / Math.max(row.min_stock * 2, 1)) * 100));
      const barColor = isLow ? "var(--red)" : pct > 60 ? "var(--green)" : "var(--amber)";

      return `
        <div class="med-card ${isLow ? 'low' : ''} fade-in" style="animation-delay:${i * 0.03}s">
          <div class="med-card-top">
            <div style="flex:1">
              <div class="med-name">${med.name}</div>
              <div class="med-detail">${med.formulation || ''} · ${med.strength || ''}</div>
            </div>
            <div class="stock-display">
              <div class="stock-num ${isLow ? 'low' : 'ok'}">${row.current_stock}</div>
              <div class="stock-min">min: ${row.min_stock}</div>
            </div>
          </div>
          <div class="stock-bar-wrap">
            <div class="stock-bar-bg">
              <div class="stock-bar-fill" style="width:${pct}%;background:${barColor}"></div>
            </div>
          </div>
          <div class="med-card-bottom">
            <div class="flags">
              <span class="flag route">${med.route || ''}</span>
              ${med.critical ? '<span class="flag critical">CRITICAL</span>' : ''}
              ${med.restricted ? '<span class="flag restricted">RESTRICTED</span>' : ''}
              ${isLow ? '<span class="flag low-flag">LOW STOCK</span>' : ''}
            </div>
            ${isEditing
              ? `<div class="edit-row">
                  <input class="edit-input" id="edit-${row.id}" type="number" value="${row.current_stock}" min="0" />
                  <button class="save-btn" onclick="saveStock('${row.id}')">✓</button>
                  <button class="cancel-btn" onclick="cancelEdit()">✕</button>
                </div>`
              : `<button class="update-btn" onclick="startEdit('${row.id}')">Update</button>`
            }
          </div>
        </div>`;
    }).join("");

    if (editingId) {
      const input = document.getElementById(`edit-${editingId}`);
      if (input) { input.focus(); input.select(); }
    }
  }

  // ── EDIT STOCK ─────────────────────────────────────────────────
  function startEdit(id) {
    editingId = id;
    renderList();
  }

  function cancelEdit() {
    editingId = null;
    renderList();
  }

  async function saveStock(id) {
    const input = document.getElementById(`edit-${id}`);
    const val = parseInt(input.value);
    if (isNaN(val) || val < 0) { showToast("Invalid value", "error"); return; }
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/stock_status?id=eq.${id}`, {
        method: "PATCH",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Prefer: "return=representation"
        },
        body: JSON.stringify({ current_stock: val, last_updated: new Date().toISOString() })
      });
      editingId = null;
      showToast("✅ Stock updated");
      loadData();
    } catch (e) {
      showToast("Failed to update", "error");
    }
  }

  // ── TABS & FILTER ──────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById("tab-ed").className = "tab-btn " + (tab === "ED" ? "active" : "inactive");
    document.getElementById("tab-ph").className = "tab-btn " + (tab === "Pharmacy" ? "active" : "inactive");
    editingId = null;
    loadData();
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderList();
  }

  // ── TOAST ──────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = "success") {
    clearTimeout(toastTimer);
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const t = document.createElement("div");
    t.className = "toast" + (type === "error" ? " error" : "");
    t.textContent = msg;
    document.body.appendChild(t);
    toastTimer = setTimeout(() => t.remove(), 3000);
  }

  // ── SERVICE WORKER (PWA offline support) ──────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
